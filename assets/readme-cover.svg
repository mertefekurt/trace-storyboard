<svg width="1280" height="420" viewBox="0 0 1280 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Trace Storyboard cover">

  <defs>
    <linearGradient id="g" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#38bdf8" stop-opacity=".34"/>
      <stop offset=".54" stop-color="#07192f" stop-opacity="0"/>
      <stop offset="1" stop-color="#facc15" stop-opacity=".30"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency=".85" numOctaves="2" seed="51" result="noise"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer><feFuncA type="table" tableValues="0 .10"/></feComponentTransfer>
      <feBlend mode="soft-light" in2="SourceGraphic"/>
    </filter>
  </defs>
  <rect width="1280" height="420" rx="30" fill="#07192f"/>
  <rect width="1280" height="420" rx="30" fill="url(#g)" filter="url(#grain)"/>

  <circle cx="1044" cy="182" r="178" fill="#38bdf8" opacity=".14"/>
  <circle cx="1138" cy="286" r="92" fill="#facc15" opacity=".18"/>
  <rect x="86" y="86" width="560" height="248" rx="26" fill="#07192f" opacity=".68" stroke="#38bdf8" stroke-width="4"/>
  <text x="124" y="178" fill="#eff6ff" font-family="Manrope, ui-sans-serif, system-ui" font-size="60" font-weight="850">Trace Storyboard</text>
  <text x="128" y="234" fill="#bae6fd" font-family="Manrope, ui-sans-serif, system-ui" font-size="23">Turn agent traces into timelines and SVG storyboards</text>
  <text x="128" y="292" fill="#facc15" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="17" font-weight="800">MODEL EVALUATION</text>

